<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" />
    <title>Fitness Sports Center | Build Strength & Confidence</title>
    <meta
      name="description"
      content="Join Fitness Sports Center to transform your body and build strength & confidence. 
      Explore our services, membership plans, expert trainers, and start your fitness journey today."
    />
    <script>
      // Set initial theme before React loads
      const savedTheme = localStorage.getItem("theme");

      if (
        savedTheme === "dark" ||
        (!savedTheme &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
